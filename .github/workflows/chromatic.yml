name: "Chromatic"

on: push

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Chromatic
        uses: chromaui/action@v1
        with:
          # Chromatic project token is required. Add this in GitHub Repository Secrets.
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
