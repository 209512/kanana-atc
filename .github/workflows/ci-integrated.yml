name: CI Integrated

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      run_playwright:
        type: boolean
        default: false
      run_chromatic:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    if: github.event_name != 'pull_request' || contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm test --silent

  playwright:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_playwright == 'true'
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps
      - run: npm run test:ct
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  chromatic:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_chromatic == 'true'
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm install --no-audit --no-fund
      - uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
